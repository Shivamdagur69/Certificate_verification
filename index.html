<!DOCTYPE html>
<html>
<head>
  <title>SDP 2.0 Certificate Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      margin: 0;
      padding: 0;
      color: #333;
    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      font-size: 22px;
      color: #1e3c72;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 16px;
      color: #555;
      margin-bottom: 25px;
    }

    input {
      width: 80%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      padding: 12px 25px;
      background: #1e3c72;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #16325c;
    }

    #result {
      margin-top: 25px;
      font-size: 16px;
      line-height: 1.6;
    }

    .valid {
      color: green;
      font-weight: bold;
    }

    .invalid {
      color: red;
      font-weight: bold;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🎓 STUDENT DEVELOPMENT PROGRAMME 2.0</h1>
  <h2>Building Research Competence</h2>

  <p><b>Organized by:</b><br>
  Lloyd Group of Institutions<br>
  UG Management Department<br>
  ThinkLab - Research Cell</p>

  <hr>

  <h3>🔍 Certificate Verification</h3>

  <input type="text" id="certID" placeholder="Enter Certificate ID">
  <br>
  <button onclick="verify()">Verify Certificate</button>

  <div id="result"></div>

  <div class="footer">
    Scan QR code on certificate or enter ID manually
  </div>

</div>

<script>
const data = {
  "SDP-2026-001": {
    name: "Shivam Dagur",
    event: "SDP 2.0 - Building Research Competence",
    date: "6 April 2026"
  },
  "SDP-2026-002": {
    name: "Rahul Kumar",
    event: "SDP 2.0 - Building Research Competence",
    date: "6 April 2026"
  }
};

// Manual verification
function verify() {
  let id = document.getElementById("certID").value.trim();
  showResult(id);
}

// QR auto verification
function getParam() {
  let url = new URLSearchParams(window.location.search);
  return url.get("cert");
}

function showResult(id) {
  let result = document.getElementById("result");

  if (data[id]) {
    result.innerHTML =
      "<p class='valid'>✅ Valid Certificate</p>" +
      "<b>Name:</b> " + data[id].name + "<br>" +
      "<b>Event:</b> " + data[id].event + "<br>" +
      "<b>Date:</b> " + data[id].date;
  } else {
    result.innerHTML =
      "<p class='invalid'>❌ Invalid Certificate</p>";
  }
}

// Auto run if QR scanned
let id = getParam();
if (id) {
  showResult(id);
}
</script>

</body>
</html>
