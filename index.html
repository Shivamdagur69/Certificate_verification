<!DOCTYPE html>
<html>
<head>
  <title>SDP Certificate Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f6f9;
      padding: 40px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      display: inline-block;
    }

    input {
      padding: 10px;
      width: 250px;
      margin: 10px;
    }

    button {
      padding: 10px 20px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🎓 Certificate Verification</h2>

  <p><b>STUDENT DEVELOPMENT PROGRAMME 2.0</b><br>
  Building Research Competence</p>

  <p>Lloyd Group of Institutions<br>
  UG Management Department<br>
  ThinkLab - Research Cell</p>

  <input type="text" id="certID" placeholder="Enter Certificate ID">
  <br>
  <button onclick="verify()">Verify</button>

  <p id="result"></p>
</div>

<script>
const data = {
  "SDP-2026-001": {
    name: "Shivam Dagur",
    event: "SDP 2.0",
    date: "6 April 2026"
  }
};

function verify(){
  let id = document.getElementById("certID").value;
  let result = document.getElementById("result");

  if(data[id]){
    result.innerHTML =
      "✅ Valid Certificate<br>" +
      "Name: " + data[id].name + "<br>" +
      "Event: " + data[id].event + "<br>" +
      "Date: " + data[id].date;
  } else {
    result.innerHTML = "❌ Invalid Certificate";
  }
}
</script>

</body>
</html>
